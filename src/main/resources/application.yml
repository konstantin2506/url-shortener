spring:
    main:
        web-application-type: none
    datasource:
        url: jdbc:postgresql://localhost:5432/my_database
        username: postgres
        password: 12345
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
                format_sql: true
app:
    domain: "https://my_domain"