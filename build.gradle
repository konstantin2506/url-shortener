plugins {
    id 'java'
    id 'org.springframework.boot' version '4.1.0'
    id 'io.spring.dependency-management' version '1.1.6'
}

group = 'com.example'
version = '1.0-SNAPSHOT'

// Рекомендуется явно указать версию Java (Spring Boot 3.x требует минимум Java 17)
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Основной стартер для веб-приложения (включает Tomcat и spring-context)
    implementation 'org.springframework.boot:spring-boot-starter-web'

    // Стартер для тестирования (автоматически включает JUnit 5 и Mockito)
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
}


